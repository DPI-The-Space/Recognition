const SP_SITE = 'https://chartercom.sharepoint.com/sites/DPInsights';
const SP_API = SP_SITE + "/_api/web/lists";

async function getDigest() {
  const r = await fetch(SP_SITE + '/_api/contextinfo', {
    method: 'POST', headers: { 'Accept': 'application/json;odata=verbose' }, credentials: 'include'
  });
  return (await r.json()).d.GetContextWebInformation.FormDigestValue;
}

async function getListType(name) {
  const r = await fetch(SP_API + "/getbytitle('" + name + "')?$select=ListItemEntityTypeFullName",
    { credentials: 'include', headers: { 'Accept': 'application/json;odata=verbose' } });
  return (await r.json()).d.ListItemEntityTypeFullName;
}

async function addItem(listName, typeName, digest, fields) {
  const body = JSON.stringify({ '__metadata': { 'type': typeName }, ...fields });
  const r = await fetch(SP_API + "/getbytitle('" + listName + "')/items", {
    method: 'POST', credentials: 'include', body,
    headers: {
      'Accept': 'application/json;odata=verbose',
      'Content-Type': 'application/json;odata=verbose',
      'X-RequestDigest': digest
    }
  });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function seedData() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Seeding...';
  
  try {
    const digest = await getDigest();
    const typeName = await getListType('Recognitions');
    
    let success = 0;
    let fail = 0;
    
    for (let i = 0; i < posts.length; i++) {
      const p = posts[i];
      try {
        await addItem('Recognitions', typeName, digest, {
          From: p.From, To: p.To, Category: p.Category,
          Message: p.Message, ImageUrl: '', Likes: 0, Tab: 'work'
        });
        success++;
        status.innerHTML += '<div class="ok">✅ ' + (i+1) + '/' + posts.length + ' — ' + p.From + ' → ' + p.To + '</div>';
      } catch(e) {
        fail++;
        status.innerHTML += '<div class="err">❌ ' + (i+1) + '/' + posts.length + ' — ' + p.From + ' → ' + p.To + ' — ' + e.message + '</div>';
      }
      // Small delay to avoid throttling
      await new Promise(r => setTimeout(r, 300));
    }
    
    btn.textContent = 'Done! (' + success + ' added, ' + fail + ' failed)';
    status.innerHTML += '<br><div class="ok" style="font-size:1.1rem;">Seeding complete! You can now close this page.</div>';
  } catch(e) {
    status.innerHTML += '<div class="err">Fatal error: ' + e.message + '</div>';
    btn.textContent = 'Failed';
  }
}
